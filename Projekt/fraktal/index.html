<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Fraktal bez szablonów</title>
    <link rel="stylesheet" href="style.css">
    <style>
    </style>
</head>
<body>
<div id="managing_panel">
    <label for="choose_fractal">Wybierz fraktal:</label>
    <select id="choose_fractal">
        <option value="mandelbrot">Zbiór Mandelbrota</option>
        <option value="julia">Zbiór Julii</option>
        <option value="barnsley">Paproć Barnsleya</option>
    </select>

    <div id="julia_params" style="display: none; margin-top: 10px;">
        <label>Parametr C (Re):</label><br>
        <input type="number" id="input_c_re" value="-0.8" step="0.01"><br>
        <label>Parametr C (Im):</label><br>
        <input type="number" id="input_c_im" value="0.156" step="0.01">
        <label>Iterations:</label><br>
        <input type="number" id="input_julia_iterations" value="200" step="10"><br>
    </div>

    <div id="barnsley_params" style="display: none; margin-top: 10px;">
        <label>Seed:</label><br>
        <input type="number" id="input_seed" value="1000" step="0.01"><br>
        <label>Iterations:</label><br>
        <input type="number" id="input_barnsley_iterations" value="1000000" step="10"><br>
    </div>

    <div id="mandelbrot_params" style="display: none; margin-top: 10px;">
        <label>Iterations:</label><br>
        <input type="number" id="input_mandelbrot_iterations" value="200" step="10"><br>
    </div>
</div>


<div id="container">
    <canvas id="fractal" width="1920" height="1080"></canvas>
    <canvas id="axis" width="1920" height="1080"></canvas>

</div>
<div id="cords">
    Re: 0.00000<br>
    Im: 0.00000
</div>




<script type="module" src="main.js"></script>
</body>
</html>
