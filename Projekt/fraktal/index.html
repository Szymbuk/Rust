<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Fraktal bez szablonów</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; margin: 0; }
        canvas {
            width: 1920px;
            height: 1080px;
            image-rendering: pixelated;
        }
        #container{
            width: 1920px;
            height: 1080px;
            position: relative;
        }
        #axis{
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        #fractal{
            width: 1920px;
            height: 1080px;
            position: absolute;
            top: 0;
            left: 0;
        }
        #cords {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 16px;
            pointer-events: none;
            z-index: 10;
        }
        #managing_panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-family: sans-serif;
            z-index: 10;
        }
        #managing_panel select, #managing_panel input {
            margin-top: 5px;
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 5px;
            width: 100%;
        }


    </style>
</head>
<body>
<div id="managing_panel">
    <label for="choose_fractal">Wybierz fraktal:</label>
    <select id="choose_fractal">
        <option value="mandelbrot">Zbiór Mandelbrota</option>
        <option value="julia">Zbiór Julii</option>
        <option value="barnsley">Paproć Barnsleya</option>
    </select>

    <div id="julia_params" style="display: none; margin-top: 10px;">
        <label>Parametr C (Re):</label><br>
        <input type="number" id="input_c_re" value="-0.8" step="0.01"><br>
        <label>Parametr C (Im):</label><br>
        <input type="number" id="input_c_im" value="0.156" step="0.01">
    </div>

    <div id="barnsley_params" style="display: none; margin-top: 10px;">
        <label>Seed:</label><br>
        <input type="number" id="input_seed" value="1000" step="0.01"><br>
    </div>
</div>


<div id="container">
    <canvas id="fractal" width="1920" height="1080"></canvas>
    <canvas id="axis" width="1920" height="1080"></canvas>

</div>
<div id="cords">
    Re: 0.00000<br>
    Im: 0.00000
</div>


<script type="module">

    import init, { generate_mandelbrot, MandelbrotConfig,
        generate_julia, JuliaConfig,
        generate_barnsley, BarnsleyConfig} from './pkg/fraktal.js';


    let x_min = -2.0;
    let x_max = 1.0;
    let y_min = -1.0;
    let y_max = 1.0;
    let iterations = 200;
    let current_fractal = "mandelbrot";



    const default_params = {
        mandelbrot: { x_min: -2.0, x_max: 1.0, y_min: -1.0, y_max: 1.0 },
        julia: { x_min: -1.5, x_max: 1.5, y_min: -1.0, y_max: 1.0 },
        barnsley: { x_min: -3, x_max: 3, y_min: -0.5, y_max: 10.5 }
    }
    const canvas = document.getElementById('fractal');
    const coords_box = document.getElementById('cords');
    let frame_waiting = false;



    function default_resolution(){
        canvas.width = 1920;
        canvas.height = 1080;
        draw()
    }

    let scroll_timer = setTimeout(default_resolution)



    async function uruchom() {
        // Inicjalizacja modułu WebAssembly
        await init();
        const select_fraktal = document.getElementById('choose_fractal');
        const julia_params = document.getElementById('julia_params');
        const barnsley_params = document.getElementById('barnsley_params');


        select_fraktal.addEventListener('change', (event) => {
            current_fractal = event.target.value;

            // Pokaż/ukryj parametry w zależności od wyboru
            if (current_fractal === "julia") {
                julia_params.style.display = "block";
                barnsley_params.style.display = "none";

            } else if (current_fractal === "barnsley") {
                julia_params.style.display = "none";
                barnsley_params.style.display = "block";
            }

            // Załaduj domyślne współrzędne dla wybranego fraktala
            const widok = domyslne_widoki[aktualny_fraktal];
            x_min = widok.x_min;
            x_max = widok.x_max;
            y_min = widok.y_min;
            y_max = widok.y_max;

            // Wymuś przeliczenie i narysowanie nowej klatki
            if (!frame_waiting) {
                frame_waiting = true;
                requestAnimationFrame(() => { draw(); frame_waiting = false; });
            }
        });




        canvas.addEventListener('wheel', handle_wheel);
        window.addEventListener('keydown',handle_keys)
        canvas.addEventListener('mousemove', handle_mousemove);
        draw();
    }


    function handle_wheel(event){
        clearTimeout(scroll_timer);
        canvas.width = 480;
        canvas.height = 270;

        event.preventDefault();

        let x_middle = (x_max + x_min) / 2;
        let y_middle = (y_max + y_min) / 2;
        let new_width;
        let new_height;
        if (event.deltaY <0) {

            new_width = (x_max - x_min) * 0.9
            new_height = (y_max - y_min) * 0.9


        }
        else{
            new_width = (x_max - x_min) * 1.1
            new_height = (y_max - y_min) * 1.1
        }
        x_min = x_middle - new_width / 2
        x_max = x_middle + new_width / 2

        y_min = y_middle - new_height / 2
        y_max = y_middle + new_height / 2
        if (!frame_waiting){
            frame_waiting = true
            requestAnimationFrame( () => {draw();frame_waiting = false} )
        }

        scroll_timer = setTimeout(default_resolution, 600)
    }


    function handle_keys(event){
        clearTimeout(scroll_timer);
        canvas.width = 480;
        canvas.height = 270;

        if (event.key === 's' || event.key === 'ArrowDown') {
            let move = (y_max - y_min) * 0.1
            y_max -= move
            y_min -= move
        }

        if (event.key === 'w' || event.key === 'ArrowUp') {
            let move = (y_max-y_min)*0.1
            y_max += move
            y_min += move
        }

        if (event.key === 'd' || event.key === 'ArrowRight') {
            let move = (x_max-x_min)*0.1
            x_max += move
            x_min += move
        }

        if (event.key === 'a' || event.key === 'ArrowLeft') {
            let move = (x_max-x_min)*0.1
            x_max -= move
            x_min -= move
        }

        if (!frame_waiting){
            frame_waiting = true
            requestAnimationFrame( () => {draw();frame_waiting = false} )
        }

        scroll_timer = setTimeout(default_resolution, 600)
    }


    function handle_mousemove(event) {
        // Pobranie pozycji piksela, nad którym jest myszka
        const rect = canvas.getBoundingClientRect();
        const mouse_x = event.clientX - rect.left;
        const mouse_y = event.clientY - rect.top;

        // Pobranie aktualnych wymiarów z elementu HTML (nie z wewnętrznej rozdzielczości!)
        const html_width = rect.width;
        const html_height = rect.height;

        // Przeliczenie pikseli na układ matematyczny
        const re = x_min + (mouse_x / html_width) * (x_max - x_min);
        const im = y_max - (mouse_y / html_height) * (y_max - y_min);

        // Formatowanie tekstu (toExponential ładnie formatuje ekstremalnie małe liczby przy dużym zoomie)
        const re_text = (Math.abs(re) < 1e-6 && re !== 0) ? re.toExponential(6) : re.toFixed(7);
        const im_text = (Math.abs(im) < 1e-6 && im !== 0) ? im.toExponential(6) : im.toFixed(7);

        // Aktualizacja HTML
        coords_box.innerHTML = `Re: ${re_text} <br>Im: ${im_text} `;
    }


    function draw(){
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        let surowePiksele;


        if (current_fractal === "mandelbrot") {
            const config = new MandelbrotConfig(x_min, x_max, y_min, y_max, iterations, width, height);
            surowePiksele = generate_mandelbrot(config);
        }
        else if (current_fractal === "julia"){
            let c_re = parseFloat(document.getElementById('input_c_re').value);
            let c_im = parseFloat(document.getElementById('input_c_im').value);

            const config = new JuliaConfig(x_min, x_max, y_min, y_max, iterations, width, height, c_re, c_im);
            surowePiksele = generate_julia(config);
        }
        else if (current_fractal === "barnsley"){

            let seed = parseFloat(document.getElementById('input_seed').value)
            const config = new BarnsleyConfig(x_min, x_max, y_min, y_max, iterations, width, height, seed);
            surowePiksele = generate_barnsley(config);
        }

        // Przekształcamy tablicę z Rusta na format obrazu dla przeglądarki
        const obraz = new ImageData(
            new Uint8ClampedArray(surowePiksele),
            width,
            height
        );

        // Rysujemy na płótnie
        ctx.putImageData(obraz, 0, 0);
        draw_axis();
    }


    function draw_axis() {
        const axis_canvas = document.getElementById('axis');
        const ctx_axis = axis_canvas.getContext('2d');
        const width = axis_canvas.width;
        const height = axis_canvas.height;

        // Czyszczenie poprzedniej klatki
        ctx_axis.clearRect(0, 0, width, height);

        // Pozycje głównego krzyża
        let x_dist = -x_min / (x_max - x_min) * width;
        let y_dist = y_max / (y_max - y_min) * height;

        // --- OBLICZANIE DYNAMICZNEJ SKALI ---
        const math_width = x_max - x_min;
        // Chcemy docelowo około 10-12 znaczników na całą szerokość ekranu
        const target_step = math_width / 10;

        // Logika do zaokrąglenia kroku do "ładnych" liczb (np. 0.1, 0.5, 1, 2, 50)
        const exponent = Math.floor(Math.log10(target_step));
        const fraction = target_step / Math.pow(10, exponent);

        let step;
        if (fraction < 1.5) step = Math.pow(10, exponent);
        else if (fraction < 3) step = 2 * Math.pow(10, exponent);
        else if (fraction < 7) step = 5 * Math.pow(10, exponent);
        else step = 10 * Math.pow(10, exponent);

        // --- RYSOWANIE GŁÓWNYCH OSI ---
        ctx_axis.beginPath();
        ctx_axis.strokeStyle = "rgba(200, 200, 200, 0.5)";
        ctx_axis.lineWidth = 2;

        ctx_axis.moveTo(x_dist, 0);
        ctx_axis.lineTo(x_dist, height);
        ctx_axis.moveTo(0, y_dist);
        ctx_axis.lineTo(width, y_dist);

        // Konfiguracja czcionki dla liczb
        ctx_axis.fillStyle = "rgba(100, 100, 100, 0.8)";
        ctx_axis.font = "14px Arial";

        // --- ZNACZNIKI OSI X (Poziomej) ---
        ctx_axis.textAlign = "center";
        ctx_axis.textBaseline = "top";

        let start_x = Math.ceil(x_min / step) * step;
        for (let v = start_x; v <= x_max; v += step) {
            // Pomiń zero, żeby nie rysować liczby na samym środku skrzyżowania
            if (Math.abs(v) < step * 0.1) continue;

            let x_pos = ((v - x_min) / (x_max - x_min)) * width;

            // Pionowa kreska znacznika
            ctx_axis.moveTo(x_pos, y_dist - 6);
            ctx_axis.lineTo(x_pos, y_dist + 6);

            // Etykieta (używamy toPrecision, by JavaScript sam użył notacji naukowej np. 1e-4)
            let label = parseFloat(v.toPrecision(9)).toString();
            ctx_axis.fillText(label, x_pos, y_dist + 12);
        }

        // --- ZNACZNIKI OSI Y (Pionowej) ---
        ctx_axis.textAlign = "left";
        ctx_axis.textBaseline = "middle";

        let start_y = Math.ceil(y_min / step) * step;
        for (let v = start_y; v <= y_max; v += step) {
            if (Math.abs(v) < step * 0.1) continue;

            let y_pos = height - ((v - y_min) / (y_max - y_min)) * height;

            // Pozioma kreska znacznika
            ctx_axis.moveTo(x_dist - 6, y_pos);
            ctx_axis.lineTo(x_dist + 6, y_pos);

            let label = parseFloat(v.toPrecision(9)).toString();
            ctx_axis.fillText(label, x_dist + 12, y_pos);
        }

        // Nanieś wszystko na płótno
        ctx_axis.stroke();
    }

    uruchom();
</script>
</body>
</html>
